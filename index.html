<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Social Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
    --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #ec4899;
    --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6;
    --dark: #0f172a; --card: #1e293b; --border: #334155;
    --text: #f8fafc; --text-muted: #94a3b8; --radius: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Tajawal', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
}
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
}
.header h2 {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.btn {
    padding: 0.7rem 1.4rem;
    border-radius: 10px;
    border: none;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
}
.btn:hover { transform: translateY(-2px); }
.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
}
.stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.3rem;
    position: relative;
    overflow: hidden;
}
.stat::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 100%; height: 3px;
}
.stat.insta::before { background: linear-gradient(90deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
.stat.tiktok::before { background: #fff; }
.stat.design::before { background: var(--warning); }
.stat.prod::before { background: var(--info); }
.stat.delay::before { background: var(--danger); }
.stat-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    margin-bottom: 0.8rem;
}
.stat-value { font-size: 1.8rem; font-weight: 800; }
.stat-label { color: var(--text-muted); font-size: 0.85rem; }
.kanban {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1rem;
}
.column {
    background: rgba(15, 23, 42, 0.5);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    min-height: 400px;
}
.col-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
}
.col-count {
    background: rgba(255,255,255,0.1);
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.8rem;
}
.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 0.8rem;
    transition: all 0.3s;
}
.card:hover {
    border-color: var(--primary);
    transform: translateY(-3px);
}
.card.delayed { border-right: 3px solid var(--danger); }
.type {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 0.25rem 0.7rem;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 700;
    margin-bottom: 0.6rem;
}
.type-reels { background: rgba(225, 48, 108, 0.15); color: #e1306c; }
.type-post { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
.type-carousel { background: rgba(139, 92, 246, 0.15); color: #8b5cf6; }
.type-story { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
.card-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.4rem; }
.card-desc {
    color: var(--text-muted);
    font-size: 0.85rem;
    line-height: 1.5;
    margin-bottom: 0.8rem;
}
.card-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 0.8rem;
}
.links {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
    flex-wrap: wrap;
}
.link {
    font-size: 0.75rem;
    color: var(--primary);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(99,102,241,0.1);
    padding: 0.3rem 0.6rem;
    border-radius: 6px;
}
.assignee {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
}
.empty {
    text-align: center;
    padding: 2rem;
    color: var(--text-muted);
    font-size: 0.9rem;
}
.loading {
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
}
.error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 1rem;
    border-radius: 10px;
    text-align: center;
}
.sync-info {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--success);
    font-size: 0.85rem;
    font-weight: 600;
}
@media (max-width: 768px) {
    body { padding: 1rem; }
    .kanban { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>
    <div class="header">
        <div>
            <h2>📱 لوحة تحكم السوشل ميديا</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">متصلة بـ Google Sheets</p>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <span class="sync-info" id="syncInfo">
                <i class="fas fa-sync-alt"></i> <span id="syncText">جاري التحميل...</span>
            </span>
            <button class="btn" onclick="loadData()">
                <i class="fas fa-sync"></i> تحديث
            </button>
        </div>
    </div>

    <div class="stats">
        <div class="stat insta">
            <div class="stat-icon" style="background: linear-gradient(45deg, #f09433, #e6683c, #dc2743);">
                <i class="fab fa-instagram"></i>
            </div>
            <div class="stat-value" id="statInsta">0</div>
            <div class="stat-label">إنستقرام</div>
        </div>
        <div class="stat tiktok">
            <div class="stat-icon" style="background: #000; border: 1px solid #333;">
                <i class="fab fa-tiktok"></i>
            </div>
            <div class="stat-value" id="statTiktok">0</div>
            <div class="stat-label">تيك توك</div>
        </div>
        <div class="stat design">
            <div class="stat-icon" style="background: var(--warning);"><i class="fas fa-paint-brush"></i></div>
            <div class="stat-value" id="statDesign">0</div>
            <div class="stat-label">قيد التصميم</div>
        </div>
        <div class="stat prod">
            <div class="stat-icon" style="background: var(--info);"><i class="fas fa-video"></i></div>
            <div class="stat-value" id="statProd">0</div>
            <div class="stat-label">قيد الإنتاج</div>
        </div>
        <div class="stat delay">
            <div class="stat-icon" style="background: var(--danger);"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="stat-value" id="statDelay">0</div>
            <div class="stat-label">متأخر</div>
        </div>
    </div>

    <div class="kanban" id="kanbanBoard">
        <div class="loading">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; display: block; margin-bottom: 1rem;"></i>
            <p>جاري جلب البيانات...</p>
        </div>
    </div>

<script>
const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbwMhPHAFuZBfMocxiVjFCjXov6Y38p3801pGgvtmBfLFK4KhDM0BTcfyIK82xUg4F3RrA/exec';

let allPosts = [];
let scriptTag = null;

const statusLabels = {
    planned: '🟡 مخطط',
    designing: '🟣 قيد التصميم',
    ready: '🟢 جاهز للإنتاج',
    producing: '🔵 قيد الإنتاج',
    scheduled: '⚪ مجدول',
    posted: '✅ منشور'
};

const typeLabels = {
    reels: 'Reels', post: 'Post', carousel: 'Carousel', story: 'Story',
    'ريلز': 'Reels', 'بوست': 'Post', 'كروسيل': 'Carousel', 'ستوري': 'Story'
};

const typeIcons = {
    reels: 'video', post: 'image', carousel: 'images', story: 'clock'
};

const statusMap = {
    'مخطط': 'planned', 'planned': 'planned', 'planed': 'planned',
    'قيد التصميم': 'designing', 'designing': 'designing',
    'جاهز للإنتاج': 'ready', 'ready': 'ready',
    'قيد الإنتاج': 'producing', 'producing': 'producing',
    'مجدول': 'scheduled', 'scheduled': 'scheduled',
    'منشور': 'posted', 'posted': 'posted'
};

function formatDate(dateStr) {
    if (!dateStr) return '---';
    try {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return d.toLocaleDateString('ar-SA', { year: 'numeric', month: '2-digit', day: '2-digit' });
    } catch(e) { return dateStr; }
}

window.handleSheetsData = function(data) {
    var syncText = document.getElementById('syncText');
    var syncInfo = document.getElementById('syncInfo');
    
    if(data && data.success && data.posts) {
        allPosts = data.posts.map(normalizePost);
        renderDashboard();
        syncText.textContent = 'تم التحديث: ' + new Date().toLocaleTimeString('ar-SA');
        syncInfo.style.color = 'var(--success)';
    } else if (data && data.error) {
        showError('خطأ: ' + data.error);
    } else {
        showError('بيانات غير صالحة');
    }
    
    if(scriptTag && scriptTag.parentNode) {
        scriptTag.parentNode.removeChild(scriptTag);
        scriptTag = null;
    }
};

function loadData() {
    var syncText = document.getElementById('syncText');
    var syncInfo = document.getElementById('syncInfo');
    var board = document.getElementById('kanbanBoard');
    
    syncText.textContent = 'جاري التحديث...';
    syncInfo.style.color = 'var(--warning)';
    
    board.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin" style="font-size: 2rem; display: block; margin-bottom: 1rem;"></i><p>جاري جلب البيانات...</p></div>';
    
    if(scriptTag && scriptTag.parentNode) scriptTag.parentNode.removeChild(scriptTag);
    
    scriptTag = document.createElement('script');
    scriptTag.src = SHEETS_API_URL + '?callback=handleSheetsData&t=' + Date.now();
    scriptTag.onerror = function() {
        showError('تعذر التحميل. تأكد من الرابط.');
        if(scriptTag && scriptTag.parentNode) scriptTag.parentNode.removeChild(scriptTag);
    };
    
    document.head.appendChild(scriptTag);
    
    setTimeout(function() {
        if(syncText.textContent === 'جاري التحديث...') {
            showError('انتهى الوقت.');
        }
    }, 10000);
}

function showError(msg) {
    document.getElementById('kanbanBoard').innerHTML = '<div class="error"><i class="fas fa-exclamation-circle" style="font-size: 2rem; margin-bottom: 0.5rem; display: block;"></i><p>' + msg + '</p><button class="btn" style="margin-top: 1rem;" onclick="loadData()"><i class="fas fa-redo"></i> إعادة المحاولة</button></div>';
    document.getElementById('syncText').textContent = 'فشل';
    document.getElementById('syncInfo').style.color = 'var(--danger)';
}

function normalizePost(row) {
    var getValue = function(keys) {
        for (var i = 0; i < keys.length; i++) {
            if (row[keys[i]] !== undefined && row[keys[i]] !== '') return row[keys[i]];
        }
        return '';
    };
    return {
        id: row['id'] || Date.now() + Math.random(),
        platform: getValue(['المنصة', 'platform']).toLowerCase().trim(),
        type: (getValue(['النوع', 'type']).toLowerCase().trim()) || 'post',
        title: getValue(['العنوان', 'title']) || 'بدون عنوان',
        desc: getValue(['الفكرة', 'desc', 'description']),
        status: statusMap[getValue(['الحالة', 'status']).trim()] || 'planned',
        date: getValue(['التاريخ', 'date']),
        designLink: getValue(['رابط التصميم', 'رابط_التصميم', 'designLink']),
        finalLink: getValue(['رابط النهائي', 'رابط_النهائي', 'finalLink']),
        designer: getValue(['المصمم', 'designer']),
        buyer: getValue(['الميديا باير', 'الميديا_باير', 'buyer'])
    };
}

function renderDashboard() {
    var insta = allPosts.filter(function(p) { return p.platform.indexOf('insta') !== -1; }).length;
    var tiktok = allPosts.filter(function(p) { return p.platform.indexOf('tik') !== -1; }).length;
    var designing = allPosts.filter(function(p) { return p.status === 'designing'; }).length;
    var producing = allPosts.filter(function(p) { return p.status === 'producing'; }).length;
    var delayed = allPosts.filter(function(p) {
        if(!p.date || p.status === 'posted') return false;
        return new Date(p.date) < new Date();
    }).length;
    
    document.getElementById('statInsta').textContent = insta;
    document.getElementById('statTiktok').textContent = tiktok;
    document.getElementById('statDesign').textContent = designing;
    document.getElementById('statProd').textContent = producing;
    document.getElementById('statDelay').textContent = delayed;
    
    var statuses = ['planned', 'designing', 'ready', 'producing', 'scheduled', 'posted'];
    var board = document.getElementById('kanbanBoard');
    
    board.innerHTML = statuses.map(function(status) {
        var statusPosts = allPosts.filter(function(p) { return p.status === status; });
        return '<div class="column"><div class="col-header"><span>' + statusLabels[status] + '</span><span class="col-count">' + statusPosts.length + '</span></div>' + (statusPosts.length === 0 ? '<div class="empty"><i class="fas fa-inbox" style="font-size:2rem;display:block;margin-bottom:0.5rem;opacity:0.5;"></i>لا توجد منشورات</div>' : statusPosts.map(createCardHTML).join('')) + '</div>';
    }).join('');
}

function createCardHTML(p) {
    var isDelayed = p.date && new Date(p.date) < new Date() && p.status !== 'posted';
    var typeKey = typeLabels[p.type] ? p.type : 'post';
    var displayDate = formatDate(p.date);
    
    var html = '<div class="card ' + (isDelayed ? 'delayed' : '') + '">';
    html += '<span class="type type-' + typeKey + '"><i class="fas fa-' + (typeIcons[typeKey] || 'file') + '"></i> ' + (typeLabels[typeKey] || p.type) + '</span>';
    html += '<div class="card-title">' + p.title + '</div>';
    html += '<div class="card-desc">' + (p.desc || 'لا يوجد وصف') + '</div>';
    html += '<div class="card-meta"><span><i class="fab fa-' + (p.platform.indexOf('tik') !== -1 ? 'tiktok' : 'instagram') + '"></i> ' + p.platform + '</span><span style="' + (isDelayed ? 'color: var(--danger); font-weight: 700;' : '') + '"><i class="fas fa-calendar"></i> ' + displayDate + '</span></div>';
    if(p.designer) html += '<div class="assignee"><i class="fas fa-paint-brush"></i>المصمم: ' + p.designer + '</div>';
    if(p.buyer) html += '<div class="assignee"><i class="fas fa-ad"></i>الميديا باير: ' + p.buyer + '</div>';
    if(p.designLink) html += '<div class="links"><a href="' + p.designLink + '" target="_blank" class="link"><i class="fas fa-paint-brush"></i> التصميم</a></div>';
    if(p.finalLink) html += '<div class="links"><a href="' + p.finalLink + '" target="_blank" class="link"><i class="fas fa-video"></i> النهائي</a></div>';
    html += '</div>';
    return html;
}

setTimeout(loadData, 1000);
</script>
</body>
</html>
