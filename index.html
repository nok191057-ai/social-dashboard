<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Social Pro Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#6366f1;--primary-dark:#4f46e5;--secondary:#ec4899;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6;--dark:#0f172a;--card:#1e293b;--border:#334155;--text:#f8fafc;--text-muted:#94a3b8;--radius:20px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;padding:2rem}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.header h2{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn{padding:0.7rem 1.4rem;border-radius:12px;border:none;font-family:'Tajawal',sans-serif;font-weight:700;cursor:pointer;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px;font-size:0.9rem;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(99,102,241,0.5)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;position:relative;overflow:hidden;transition:all 0.4s;cursor:pointer}
.stat-card:hover{transform:translateY(-8px) scale(1.02);box-shadow:0 10px 40px -10px rgba(0,0,0,0.5)}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:100%;height:4px}
.stat-card.insta::before{background:linear-gradient(90deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.stat-card.tiktok::before{background:#fff}
.stat-card.design::before{background:var(--warning)}
.stat-card.prod::before{background:var(--info)}
.stat-card.delay::before{background:var(--danger)}
.stat-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:1rem}
.stat-value{font-size:2.2rem;font-weight:900}
.stat-label{color:var(--text-muted);font-size:0.9rem;margin-top:0.3rem}
.filters{display:flex;gap:0.6rem;margin-bottom:1.5rem;flex-wrap:wrap}
.filter-chip{padding:0.6rem 1.4rem;border-radius:25px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:'Tajawal',sans-serif;font-weight:700;cursor:pointer;transition:all 0.3s;font-size:0.85rem}
.filter-chip:hover{border-color:var(--primary);color:var(--primary);transform:translateY(-2px)}
.filter-chip.active{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;border-color:var(--primary);box-shadow:0 0 20px rgba(99,102,241,0.3)}
.kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem}
.kanban-column{background:rgba(15,23,42,0.6);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;min-height:450px}
.kanban-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;padding-bottom:0.8rem;border-bottom:1px solid var(--border);font-weight:800;font-size:1rem}
.kanban-count{background:rgba(255,255,255,0.1);padding:3px 12px;border-radius:12px;font-size:0.85rem;font-weight:700}
.content-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.2rem;margin-bottom:1rem;transition:all 0.4s;cursor:pointer}
.content-card:hover{border-color:var(--primary);transform:translateY(-6px) scale(1.02);box-shadow:0 0 20px rgba(99,102,241,0.3)}
.content-card.delayed{border-right:4px solid var(--danger);animation:pulseRed 2s infinite}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.2)}50%{box-shadow:0 0 15px 3px rgba(239,68,68,0.3)}}
.card-type{display:inline-flex;align-items:center;gap:6px;padding:0.35rem 0.9rem;border-radius:8px;font-size:0.8rem;font-weight:800;margin-bottom:0.8rem}
.type-reels{background:rgba(225,48,108,0.15);color:#e1306c;border:1px solid rgba(225,48,108,0.2)}
.type-post{background:rgba(59,130,246,0.15);color:#3b82f6;border:1px solid rgba(59,130,246,0.2)}
.type-carousel{background:rgba(139,92,246,0.15);color:#8b5cf6;border:1px solid rgba(139,92,246,0.2)}
.type-story{background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.2)}
.card-title{font-weight:800;font-size:1.05rem;margin-bottom:0.5rem}
.card-desc{color:var(--text-muted);font-size:0.9rem;line-height:1.7;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;justify-content:space-between;align-items:center;font-size:0.85rem;color:var(--text-muted);margin-bottom:0.8rem}
.card-platform{display:flex;align-items:center;gap:6px;padding:0.3rem 0.7rem;background:rgba(255,255,255,0.05);border-radius:8px}
.card-date{display:flex;align-items:center;gap:5px}
.card-date.urgent{color:var(--danger);font-weight:800;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}
.card-assignees{display:flex;gap:0.8rem;margin-bottom:0.8rem;flex-wrap:wrap}
.assignee-tag{font-size:0.8rem;color:var(--text-muted);display:flex;align-items:center;gap:5px;padding:0.3rem 0.7rem;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid var(--border)}
.assignee-tag i{color:var(--primary)}
.card-links{display:flex;gap:0.5rem;flex-wrap:wrap}
.link-btn{font-size:0.75rem;color:var(--primary);text-decoration:none;display:inline-flex;align-items:center;gap:5px;background:rgba(99,102,241,0.08);padding:0.4rem 0.8rem;border-radius:8px;border:1px solid rgba(99,102,241,0.15);transition:all 0.3s;font-weight:600}
.link-btn:hover{background:rgba(99,102,241,0.2);transform:translateY(-2px)}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text-muted)}
.empty-state i{font-size:2.5rem;margin-bottom:1rem;opacity:0.3;display:block}
.loading-container{text-align:center;padding:4rem;color:var(--text-muted);grid-column:1/-1}
.shimmer-wrapper{display:flex;flex-direction:column;gap:1rem;align-items:center}
.shimmer-circle{width:60px;height:60px;border-radius:50%;background:linear-gradient(90deg,var(--card) 25%,var(--card-hover) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmerMove 1.5s infinite}
.shimmer-line{width:200px;height:12px;border-radius:6px;background:linear-gradient(90deg,var(--card) 25%,var(--card-hover) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmerMove 1.5s infinite}
@keyframes shimmerMove{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-state{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);color:var(--danger);padding:2rem;border-radius:var(--radius);text-align:center;grid-column:1/-1}
.toast-container{position:fixed;top:2rem;left:2rem;z-index:10000;display:flex;flex-direction:column;gap:0.8rem}
.toast{padding:1rem 1.5rem;border-radius:12px;font-weight:700;font-size:0.95rem;display:flex;align-items:center;gap:0.8rem;animation:toastIn 0.4s ease,toastOut 0.4s ease 2.6s forwards;box-shadow:0 10px 30px rgba(0,0,0,0.3);backdrop-filter:blur(10px)}
.toast-success{background:rgba(16,185,129,0.9);color:white;border:1px solid rgba(16,185,129,0.3)}
.toast-error{background:rgba(239,68,68,0.9);color:white;border:1px solid rgba(239,68,68,0.3)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-50px)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;z-index:9999;padding:1rem}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:2rem;animation:modalIn 0.4s cubic-bezier(0.4,0,0.2,1)}
@keyframes modalIn{from{opacity:0;transform:scale(0.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.modal-title{font-size:1.4rem;font-weight:800}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:1.5rem;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.3s}
.modal-close:hover{background:rgba(255,255,255,0.1);color:white}
.modal-body{line-height:1.8}
.modal-body .detail-row{display:flex;gap:1rem;padding:0.8rem 0;border-bottom:1px solid var(--border)}
.modal-body .detail-label{color:var(--text-muted);min-width:120px;font-weight:700}
.modal-body .detail-value{flex:1}
@media(max-width:768px){body{padding:1rem}.header h2{font-size:1.6rem}.kanban{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<div class="header">
    <div>
        <h2>📱 لوحة تحكم السوشل ميديا</h2>
        <p style="color:var(--text-muted);margin-top:0.5rem">متصلة بـ Google Sheets</p>
    </div>
    <div style="display:flex;gap:1rem;align-items:center">
        <button class="btn" id="refreshBtn" onclick="loadData()"><i class="fas fa-sync-alt"></i> تحديث</button>
    </div>
</div>

<div class="stats-grid" id="statsGrid">
    <div class="stat-card insta">
        <div class="stat-icon" style="background:linear-gradient(45deg,#f09433,#e6683c,#dc2743)"><i class="fab fa-instagram"></i></div>
        <div class="stat-value" id="statInsta">0</div><div class="stat-label">إنستقرام</div>
    </div>
    <div class="stat-card tiktok">
        <div class="stat-icon" style="background:#000;border:1px solid #333"><i class="fab fa-tiktok"></i></div>

    </div>

        <div class="stat-icon" style="background:var(--warning)"><i class="fas fa-paint-brush"></i></div>
        <div class="stat-value" id="statDesign">0</div><div class="stat-label">قيد التصميم</div>
    </div>
    <div class="stat-card prod">
        <div class="stat-icon" style="background:var(--info)"><i class="fas fa-video"></i></div>
        <div class="stat-value" id="statProd">0</div><div class="stat-label">قيد الإنتاج</div>
    </div>
    <div class="stat-card delay">
        <div class="stat-icon" style="background:var(--danger)"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="stat-value" id="statDelay">0</div><div class="stat-label">متأخر</div>
    </div>
</div>

<div class="filters">
    <button class="filter-chip active" onclick="filterPosts('all')">الكل</button>
    <button class="filter-chip" onclick="filterPosts('instagram')">إنستقرام</button>
    <button class="filter-chip" onclick="filterPosts('tiktok')">تيك توك</button>
    <button class="filter-chip" onclick="filterPosts('designer')">👨‍🎨 مهام المصمم</button>
    <button class="filter-chip" onclick="filterPosts('buyer')">📱 مهام الميديا باير</button>
</div>
